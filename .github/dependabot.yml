version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  # NOTE: The 'pip' ecosystem does not parse Poetry's [tool.poetry.dependencies]
  # format. Python dependency updates require manual `poetry update` or migrating
  # to Renovate Bot which has native Poetry support.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
