name: Build on Tag

# NOTE: Tags should only be pushed from the main branch.
# Configure tag protection rules in GitHub repo settings to enforce this.
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5
        with:
          python-version: '3.12'

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          TOML_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['tool']['poetry']['version'])")
          echo "Tag version: $TAG_VERSION"
          echo "pyproject.toml version: $TOML_VERSION"
          if [[ "$TAG_VERSION" != "$TOML_VERSION" ]]; then
            echo "ERROR: Tag v$TAG_VERSION does not match pyproject.toml version $TOML_VERSION"
            exit 1
          fi
          echo "Version check passed."

  macos:
    needs: [validate]
    strategy:
      matrix:
        os: [ macos-latest ]  # macos-13 (Intel) removed — nearing GitHub deprecation; Apple Silicon is primary target
    uses: ./.github/workflows/_build-macos.yaml
    with:
      os: ${{ matrix.os }}

  windows:
    needs: [validate]
    uses: ./.github/workflows/_build-windows.yaml

  linux:
    needs: [validate]
    uses: ./.github/workflows/_build-linux.yaml

  release:
    name: "Release"
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    needs:
      - macos
      - windows
      - linux
    if: ${{ needs.macos.result == 'success' && needs.windows.result == 'success' && needs.linux.result == 'success' }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: release
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R release

      - name: Generate SHA256SUMS
        run: |
          cd release
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -exec sha256sum {} + | sed 's|\./||' | tee SHA256SUMS.txt

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda  # v2.2.1
        with:
          files: |
            release/*
          generate_release_notes: true
