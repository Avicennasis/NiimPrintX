name: Build on Tag

# NOTE: Tags should only be pushed from the main branch.
# Configure tag protection rules in GitHub repo settings to enforce this.
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5
        with:
          python-version: '3.12'

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          TOML_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['tool']['poetry']['version'])")
          echo "Tag version: $TAG_VERSION"
          echo "pyproject.toml version: $TOML_VERSION"
          if [[ "$TAG_VERSION" != "$TOML_VERSION" ]]; then
            echo "ERROR: Tag v$TAG_VERSION does not match pyproject.toml version $TOML_VERSION"
            exit 1
          fi
          echo "Version check passed."

  macos:
    needs: [validate]
    strategy:
      matrix:
        os: [ macos-latest ]  # macos-13 (Intel) removed — nearing GitHub deprecation; Apple Silicon is primary target
    uses: ./.github/workflows/_build-macos.yaml
    with:
      os: ${{ matrix.os }}

  windows:
    needs: [validate]
    uses: ./.github/workflows/_build-windows.yaml

  linux:
    needs: [validate]
    uses: ./.github/workflows/_build-linux.yaml

  release:
    name: "Release"
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    needs:
      - macos
      - windows
      - linux
    # No explicit if: needed — needs: already enforces all dependencies must succeed
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: release
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R release

      - name: Validate artifact count
        run: |
          COUNT=$(find release -maxdepth 1 -type f | wc -l)
          echo "Found $COUNT release artifacts"
          if [[ "$COUNT" -lt 6 ]]; then
            echo "ERROR: Expected at least 6 artifacts, found $COUNT"
            exit 1
          fi

      - name: Generate SHA256SUMS
        run: |
          cd release
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -exec sha256sum {} + | sed 's|\./||' | tee SHA256SUMS.txt

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: |
            release/*
          generate_release_notes: true
