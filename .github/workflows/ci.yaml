name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: "Tests"
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
        include:
          - python-version: '3.14'
            experimental: true
    continue-on-error: ${{ matrix.experimental || false }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Install poetry
        run: pipx install poetry==2.3.3

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install --without build

      - name: CLI smoke test
        run: poetry run niimprintx --help

      - name: Run tests
        run: poetry run pytest -v --cov=NiimPrintX --cov-report=term-missing --cov-report=xml --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.xml
          retention-days: 30

      - name: Upload coverage report
        if: always() && matrix.python-version == '3.13'
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  lint:
    name: "Lint"
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions: {}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Install poetry
        run: pipx install poetry==2.3.3

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5
        with:
          python-version: '3.12'
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install --without build

      - name: Lint with ruff
        run: poetry run ruff check NiimPrintX/ tests/

      - name: Format check with ruff
        run: poetry run ruff format --check NiimPrintX/ tests/

      - name: Type check with mypy
        run: poetry run mypy NiimPrintX/

  audit:
    name: "Dependency Audit"
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions: {}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Install poetry
        run: pipx install poetry==2.3.3

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5
        with:
          python-version: '3.12'
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install --without build

      - name: Install poetry-plugin-export
        run: pipx inject poetry poetry-plugin-export

      - name: Export requirements
        run: poetry export -f requirements.txt --output requirements.txt --without-hashes --all-extras

      - name: Audit dependencies
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266  # v1.1.0
        with:
          inputs: requirements.txt
