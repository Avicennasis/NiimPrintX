name: Bug report
description: Something is broken or behaves unexpectedly
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report!

        ⚠ **Bugs that affect upstream NiimPrintX** belong at
        [labbots/NiimPrintX](https://github.com/labbots/NiimPrintX/issues).
        This tracker is for fork-specific issues — the multi-OS build
        pipeline, the security-review patch series, repo-meta files.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: What you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduce
      description: A minimal example. Ideally a small script plus the exact commands you ran.
      placeholder: |
        # paste minimal repro here
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "NiimPrintX version / commit"
      description: "Version tag you installed, or the commit SHA you built from."
      placeholder: "v0.9.1 or a1b2c3d"
    validations:
      required: true

  - type: input
    id: runtime-version
    attributes:
      label: Python version
      description: "`python --version` output."
      placeholder: "3.12.x"

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Linux / macOS / Windows + version"

  - type: input
    id: printer
    attributes:
      label: Printer model
      description: "Which NiimBot model — D11 / B21 / B1 / D110 / B18 / etc."

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any stack trace, error message, or unexpected output.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help.
